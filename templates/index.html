<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Node Dashboard</title>
    <!-- Use FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f8fafc;
            /* clean white/gray background */
            --surface-color: #ffffff;
            /* white cards */
            --primary: #ca8a04;
            /* mustard yellow accent */
            --secondary: #a16207;
            /* darker yellow for hover */
            --text-main: #1e293b;
            /* dark slate text */
            --text-muted: #64748b;
            /* slate muted text */
            --border: #eab308;
            /* mustard yellow border */
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --success: #15803d;
            --danger: #b91c1c;
            --warning: #d97706;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid #e2e8f0;
            border-top: 4px solid var(--border);
            /* Mustard yellow accent at the top */
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
            margin-bottom: 18px;
        }

        h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2 i {
            color: var(--primary);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #f1f5f9;
        }

        .data-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .data-value {
            font-weight: 600;
            color: var(--text-main);
        }

        pre {
            background-color: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 8px;
            border: 1px solid #e2e8f0;
        }

        /* Forms */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        button:hover {
            background: var(--secondary);
        }

        .btn-checkout {
            background: var(--success);
        }

        .btn-checkout:hover {
            background: #166534;
        }

        .btn-icon {
            background: white;
            border: 1px solid #e2e8f0;
            color: var(--text-muted);
        }

        .btn-icon:hover {
            background: #f8fafc;
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-primary-outline {
            background: white;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-primary-outline:hover {
            background: rgba(234, 179, 8, 0.05);
        }

        .status-msg {
            margin-top: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 20px;
            text-align: center;
        }

        .success {
            color: var(--success);
        }

        .error {
            color: var(--danger);
        }

        /* Accordion / Hidden Content */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
        }

        .collapsible-content.expanded {
            max-height: 1000px;
            transition: max-height 0.3s ease-in;
        }

        /* Direct Add Buttons */
        .quick-add-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .quick-add-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
        }

        .quick-add-btn:hover {
            border-color: var(--primary);
            background: rgba(234, 179, 8, 0.05);
            transform: translateY(-2px);
        }

        .quick-add-btn i {
            font-size: 1.4rem;
            color: var(--primary);
        }

        .item-icon {
            font-size: 1.1rem;
            margin-right: 8px;
            vertical-align: middle;
            color: var(--primary);
        }

        .badge-stock {
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .stock-ok {
            background: #dcfce7;
            color: #166534;
        }

        .stock-low {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>

    <h1 id="node-title"><i class="fa-solid fa-layer-group"></i> Node Dashboard</h1>

    <div class="dashboard">
        <!-- System Status (Collapsible) -->
        <div class="card" style="grid-column: 1 / -1;">
            <div class="card-header" style="cursor: pointer;" onclick="toggleSystemStatus()">
                <h2><i class="fa-solid fa-sliders"></i> Node Configuration</h2>
                <i class="fa-solid fa-chevron-down" id="status-toggle-icon" style="color: var(--text-muted)"></i>
            </div>

            <div id="system-status-content" class="collapsible-content">
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 32px; padding-top: 10px;">
                    <div>
                        <div class="data-row"><span class="data-label">Node Identifier</span><span class="data-value"
                                id="info-id">-</span></div>
                        <div class="data-row"><span class="data-label">Network Port</span><span class="data-value"
                                id="info-port">-</span></div>
                        <div class="data-row"><span class="data-label">Quorum Replicas (N)</span><span
                                class="data-value" id="info-n">-</span></div>
                        <div class="data-row"><span class="data-label">Read Config (R)</span><span class="data-value"
                                id="info-r">-</span></div>
                        <div class="data-row"><span class="data-label">Write Config (W)</span><span class="data-value"
                                id="info-w">-</span></div>
                    </div>

                    <div class="form-group" style="padding-left: 0;">
                        <label class="data-label" style="margin-bottom: 4px;">Adjust Consistency Strategy</label>
                        <div style="display: flex; gap: 16px;">
                            <div style="flex: 1;">
                                <label for="input-r" class="data-label"
                                    style="font-size: 0.75rem; display: block; margin-bottom: 4px;">Read (R)</label>
                                <input type="number" id="input-r" placeholder="R" min="1" max="5" style="width: 100%;">
                            </div>
                            <div style="flex: 1;">
                                <label for="input-w" class="data-label"
                                    style="font-size: 0.75rem; display: block; margin-bottom: 4px;">Write (W)</label>
                                <input type="number" id="input-w" placeholder="W" min="1" max="5" style="width: 100%;">
                            </div>
                        </div>
                        <button onclick="updateConfig()" style="margin-top: 8px;"><i class="fa-solid fa-save"></i> Save
                            Rules</button>
                        <div id="config-status" class="status-msg"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fa-solid fa-warehouse"></i> Global Catalog</h2>
            </div>
            <div id="inventory-container">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Initializing catalog...
                </div>
            </div>
            <div id="inv-status" class="status-msg"></div>
        </div>

        <!-- Cart Operations (Direct Add) -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fa-solid fa-cart-plus"></i> Add to Cart</h2>
            </div>
            <div class="form-group">
                <label class="data-label">Active User ID</label>
                <input type="text" id="add-user-id" placeholder="Enter ID..." value="user1"
                    oninput="document.getElementById('view-user-id').value = this.value">

                <h3 style="font-size: 0.9rem; color: var(--text-muted); margin-top: 15px; margin-bottom: 8px;">Select
                    Item:</h3>

                <div class="quick-add-grid" id="quick-add-grid">
                    <!-- Dynamic buttons injected here -->
                </div>

                <div id="add-status" class="status-msg"></div>
            </div>
        </div>

        <!-- Cart View -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fa-solid fa-shopping-basket"></i> Cart Manager</h2>
            </div>

            <div class="form-group" style="margin-top: 0; margin-bottom: 24px;">
                <div style="display: flex; gap: 12px; align-items: flex-end;">
                    <div style="flex-grow: 1;">
                        <span class="data-label" style="font-size: 0.75rem;">Viewing User</span>
                        <input type="text" id="view-user-id" placeholder="User ID" value="user1"
                            style="width: 100%; margin-top: 4px;"
                            oninput="document.getElementById('add-user-id').value = this.value">
                    </div>
                    <button class="btn-icon" style="height: 42px; width: 42px;" onclick="fetchState()">
                        <i class="fa-solid fa-sync"></i>
                    </button>
                </div>
            </div>

            <div id="cart-contents">
                <div style="color: var(--text-muted); font-style: italic; text-align: center; padding: 20px 0;">
                    <i class="fa-solid fa-box-open"
                        style="font-size: 2rem; margin-bottom: 12px; display: block; opacity: 0.3;"></i>
                    Cart is currently empty
                </div>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                <span class="data-label" style="font-size: 0.8rem;">Vector Clock State:</span>
                <pre id="cart-vc">{}</pre>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn-checkout" style="flex: 2;" onclick="checkout()">
                    <i class="fa-solid fa-credit-card"></i> Checkout
                </button>
                <button class="btn-primary-outline" style="flex: 1; border-color: var(--danger); color: var(--danger);" onclick="emptyCart()">
                    <i class="fa-solid fa-trash-can"></i> Empty
                </button>
            </div>
            <div id="checkout-status" class="status-msg"></div>
        </div>

    </div>

    <script>
        let currentNodeId = "";

        // Icon mapping helper
        const itemIcons = {
            'laptop': 'fa-laptop',
            'mouse': 'fa-computer-mouse',
            'keyboard': 'fa-keyboard',
            'monitor': 'fa-desktop',
            'phone': 'fa-mobile-screen',
            'tablet': 'fa-tablet-screen-button'
        };

        function getIconClass(itemName) {
            const key = itemName.toLowerCase();
            return itemIcons[key] || 'fa-box'; // Default to a box icon
        }

        function toggleSystemStatus() {
            const content = document.getElementById('system-status-content');
            const icon = document.getElementById('status-toggle-icon');

            content.classList.toggle('expanded');
            if (content.classList.contains('expanded')) {
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        async function resetInventory() {
            if (!confirm("Are you sure you want to reset all inventory stock across all nodes?")) return;

            const statusEl = document.getElementById('inv-status');
            statusEl.textContent = "Resetting Inventory...";
            statusEl.className = "status-msg";

            try {
                // Default stocks
                const updates = { "updates": { "laptop": 25, "mouse": 100 } };
                const res = await fetch('/inventory/manage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                if (res.ok) {
                    statusEl.textContent = "Inventory reset and replicating!";
                    statusEl.className = "status-msg success";
                    fetchState();
                }
            } catch (e) {
                statusEl.textContent = "Error resetting inventory";
                statusEl.className = "status-msg error";
            }
        }

        async function fetchState() {
            try {
                const userId = document.getElementById('view-user-id').value || "user1";
                const response = await fetch(`/state?user_id=${userId}`);
                const data = await response.json();

                // Update Node Info
                const titleEl = document.getElementById('node-title');
                if (titleEl) {
                    titleEl.innerHTML = `<i class="fa-solid fa-layer-group"></i> Node ${data.node_id.toUpperCase()}`;
                }

                // Safely update all info fields
                const updateField = (id, val) => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = val;
                };

                updateField('info-id', data.node_id);
                updateField('info-port', data.port);
                updateField('info-r', data.r);
                updateField('info-w', data.w);
                updateField('info-n', data.n);

                currentNodeId = data.node_id;

                // Update Inventory
                let invHtml = '';
                let quickAddHtml = '';

                for (const [item, details] of Object.entries(data.inventory)) {
                    const iconClass = getIconClass(item);
                    const isLowStock = details.stock <= 5;
                    const price = details.price ? details.price.toLocaleString() : "N/A";

                    // Build Inventory List 
                    invHtml += `
                        <div style="margin-bottom: 16px; border: 1px solid #f1f5f9; padding: 16px; border-radius: 12px;">
                            <div class="data-row" style="border-bottom: none; margin-bottom: 4px;">
                                <span style="font-size: 1rem; text-transform: capitalize; font-weight: 700;">
                                    <i class="fa-solid ${iconClass}" style="color: var(--primary); margin-right: 8px;"></i>${item}
                                </span>
                                <span class="badge-stock ${isLowStock ? 'stock-low' : 'stock-ok'}">
                                    ${details.stock} in stock
                                </span>
                            </div>
                            <div class="data-label" style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                                <span>Price: ₹${price}</span>
                                <span style="color: var(--text-muted)">
                                    <i class="fa-solid fa-code-merge" style="font-size: 0.7rem;"></i> 
                                    ${JSON.stringify(details.vector_clock || {}).replace(/[{}"]/g, "")}
                                </span>
                            </div>
                        </div>
                    `;

                    // Build Quick Add Buttons corresponding to Inventory
                    quickAddHtml += `
                        <div class="quick-add-btn" onclick="addToCart('${item}', 1)">
                            <i class="fa-solid ${iconClass}"></i>
                            <span style="font-weight: bold; text-transform: capitalize;">${item}</span>
                            <span style="font-size: 0.8rem; color: var(--text-muted);">+ Add 1</span>
                        </div>
                    `;
                }
                document.getElementById('inventory-container').innerHTML = invHtml;

                // Only update the quick-add buttons if they've changed to avoid flash interactions
                const quickAddGrid = document.getElementById('quick-add-grid');
                if (quickAddGrid.innerHTML.trim() !== quickAddHtml.trim() && quickAddHtml.length > 0) {
                    quickAddGrid.innerHTML = quickAddHtml;
                }

                // Update Cart
                if (data.cart && data.cart.items && Object.keys(data.cart.items).length > 0) {
                    let cartHtml = '';
                    for (const [item, qty] of Object.entries(data.cart.items)) {
                        const iconClass = getIconClass(item);
                        cartHtml += `
                        <div class="data-row" style="padding: 12px; border-radius: 8px; border: 1px solid #f1f5f9; margin-bottom: 10px; align-items: center;">
                            <span style="text-transform: capitalize; font-weight: 500;">
                                <i class="fa-solid ${iconClass}" style="color: var(--primary); margin-right: 12px; font-size: 1.1rem;"></i> ${item}
                            </span>
                            <span class="data-value" style="background: var(--primary); padding: 2px 10px; border-radius: 12px; color: white; font-size: 0.8rem;">Qty: ${qty}</span>
                        </div>`;
                    }
                    document.getElementById('cart-contents').innerHTML = cartHtml;
                    document.getElementById('cart-vc').textContent = JSON.stringify(data.cart.vector_clock || {}, null, 2);
                } else {
                    document.getElementById('cart-contents').innerHTML = `
                        <div style="color: var(--text-muted); font-style: italic; text-align: center; padding: 20px 0;">
                            <i class="fa-solid fa-box-open" style="font-size: 2rem; margin-bottom: 12px; display: block; opacity: 0.3;"></i>
                            Cart is currently empty
                        </div>`;
                    document.getElementById('cart-vc').textContent = '{}';
                }

            } catch (error) {
                console.error("Error fetching state:", error);
            }
        }

        async function addToCart(itemName, qty) {
            const userId = document.getElementById('add-user-id').value;
            const statusEl = document.getElementById('add-status');

            if (!userId || !itemName) {
                statusEl.textContent = "Please provide an Active User ID";
                statusEl.className = "status-msg error";
                return;
            }

            statusEl.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Sending write request...`;
            statusEl.className = "status-msg";

            try {
                const res = await fetch('/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, item: itemName, quantity: qty })
                });

                const data = await res.json();

                if (res.ok) {
                    statusEl.innerHTML = `<i class="fa-solid fa-check"></i> Added ${itemName}!`;
                    statusEl.className = "status-msg success";
                } else {
                    statusEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${data.status} (Failed Quorum)`;
                    statusEl.className = "status-msg error";
                }

                // Clear success message after 3 seconds
                setTimeout(() => { if (statusEl.className.includes("success")) statusEl.textContent = ""; }, 3000);

                fetchState();
            } catch (e) {
                statusEl.innerHTML = `<i class="fa-solid fa-xmark"></i> Network Error`;
                statusEl.className = "status-msg error";
            }
        }

        async function emptyCart() {
            const userId = document.getElementById('view-user-id').value;
            const statusEl = document.getElementById('checkout-status');

            if (!userId) return;
            if (!confirm("Are you sure you want to empty your cart?")) return;

            statusEl.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Emptying cart...`;
            statusEl.className = "status-msg";

            try {
                const res = await fetch('/cart/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });

                if (res.ok) {
                    statusEl.innerHTML = `<i class="fa-solid fa-trash-check"></i> Cart Cleared`;
                    statusEl.className = "status-msg success";
                    fetchState();
                    setTimeout(() => { statusEl.textContent = ""; }, 3000);
                }
            } catch (e) {
                statusEl.textContent = "Error emptying cart";
                statusEl.className = "status-msg error";
            }
        }

        async function checkout() {
            const userId = document.getElementById('view-user-id').value;
            const statusEl = document.getElementById('checkout-status');

            if (!userId) {
                statusEl.textContent = "User ID missing";
                return;
            }

            statusEl.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Processing distributed checkout...`;
            statusEl.className = "status-msg";

            try {
                const res = await fetch('/cart/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });

                const data = await res.json();
                if (res.ok) {
                    statusEl.innerHTML = `<i class="fa-solid fa-badge-check"></i> Checkout Successful!`;
                    statusEl.className = "status-msg success";
                } else {
                    statusEl.innerHTML = `<i class="fa-solid fa-xmark"></i> Failed: ${data.message}`;
                    statusEl.className = "status-msg error";
                }

                setTimeout(() => { statusEl.textContent = ""; }, 5000);

                fetchState();
            } catch (e) {
                statusEl.textContent = "Error processing checkout";
                statusEl.className = "status-msg error";
            }
        }

        async function updateConfig() {
            const r = parseInt(document.getElementById('input-r').value);
            const w = parseInt(document.getElementById('input-w').value);
            const statusEl = document.getElementById('config-status');

            let payload = {};
            if (!isNaN(r)) payload.r = r;
            if (!isNaN(w)) payload.w = w;

            if (Object.keys(payload).length === 0) {
                statusEl.textContent = "Provide R or W";
                statusEl.className = "status-msg error";
                return;
            }

            statusEl.textContent = "Updating...";

            try {
                const res = await fetch('/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    statusEl.innerHTML = `<i class="fa-solid fa-check"></i> Quorum Parameters Updated!`;
                    statusEl.className = "status-msg success";
                    document.getElementById('input-r').value = '';
                    document.getElementById('input-w').value = '';
                    fetchState();
                    setTimeout(() => { statusEl.textContent = ""; }, 3000);
                }
            } catch (e) {
                statusEl.textContent = "Update failed";
                statusEl.className = "status-msg error";
            }
        }

        // Initial Load and Polling
        fetchState();
        setInterval(fetchState, 3000); // Poll every 3 seconds to keep UI synced without manual refresh
    </script>
</body>

</html>
